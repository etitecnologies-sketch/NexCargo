# ===========================================
# NGINX — Proxy Reverso NexCargo
# Direciona cada domínio para o serviço certo
# ===========================================

# Redireciona HTTP → HTTPS
server {
    listen 80;
    server_name _;

    # Necessário para renovar certificado SSL
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- FRONTEND (app principal) ---
server {
    listen 443 ssl http2;
    server_name app.nexcargo.com.br;  # substitua pelo seu domínio

    ssl_certificate     /etc/letsencrypt/live/app.nexcargo.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.nexcargo.com.br/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    # Segurança
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Tamanho máximo de upload (etiquetas, documentos)
    client_max_body_size 10M;

    location / {
        proxy_pass         http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# --- N8N (automações) ---
server {
    listen 443 ssl http2;
    server_name n8n.nexcargo.com.br;

    ssl_certificate     /etc/letsencrypt/live/app.nexcargo.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.nexcargo.com.br/privkey.pem;

    client_max_body_size 16M;

    location / {
        proxy_pass         http://n8n:5678;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        chunked_transfer_encoding on;
    }
}

# --- EVOLUTION API (WhatsApp) ---
server {
    listen 443 ssl http2;
    server_name evolution.nexcargo.com.br;

    ssl_certificate     /etc/letsencrypt/live/app.nexcargo.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.nexcargo.com.br/privkey.pem;

    location / {
        proxy_pass         http://evolution_api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
